# Mixed-vendor demo — writer running on Anthropic Claude.
# Pair with mixed-vendor-reviewer (OpenAI) + mixed-vendor-test-writer (Ollama).
# Demonstrates the "any model" claim: three vendors on the same wire,
# coordinating end-to-end via MMP.

[identity]
name = "mvendor-writer"
role = "writer"

[mesh]
group = "xmesh-mixed-vendor-demo"

[role_weights]
focus = 2.0
issue = 1.0
intent = 2.5
motivation = 1.5
commitment = 1.0
perspective = 0.5
mood = 0.6

[model]
adapter = "anthropic"
model_name = "claude-haiku-4-5-20251001"
max_tokens_per_call = 1024

[context]
k_lineage = 3
n_own = 5
n_group = 10
max_context_tokens = 8000

[budget]
max_wakes_per_minute = 5
max_wakes_per_hour = 30
max_wakes_per_day = 100
max_cost_usd_per_hour = 0.50
max_cost_usd_per_day = 2.00
max_cost_usd_per_run = 1.00

[safety]
cycle_depth = 5
approval_gates = "default"

[routing]
response_routing = "broadcast"

[attach]
mode = "headless"
