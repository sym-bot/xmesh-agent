# Mixed-vendor demo — reviewer running on OpenAI gpt-4o-mini.

[identity]
name = "mvendor-reviewer"
role = "reviewer"

[mesh]
group = "xmesh-mixed-vendor-demo"

[role_weights]
focus = 1.0
issue = 2.5
intent = 1.2
motivation = 0.8
commitment = 2.0
perspective = 0.5
mood = 0.6

[model]
adapter = "openai"
model_name = "gpt-4o-mini"
max_tokens_per_call = 1024

[context]
k_lineage = 3
n_own = 5
n_group = 10
max_context_tokens = 8000

[budget]
max_wakes_per_minute = 5
max_wakes_per_hour = 30
max_wakes_per_day = 100
max_cost_usd_per_hour = 0.50
max_cost_usd_per_day = 2.00
max_cost_usd_per_run = 1.00

[safety]
cycle_depth = 5
approval_gates = "default"

[routing]
response_routing = "broadcast"

[attach]
mode = "headless"
