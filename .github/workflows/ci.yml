name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: unit tests (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Verify package tarball contents
        if: matrix.node == '22'
        run: |
          npm pack --dry-run
          if npm pack --dry-run 2>&1 | grep -E 'test/|node_modules/|\.git/' ; then
            echo "::error::Tarball leaked test/, node_modules/, or .git/"
            exit 1
          fi

  install-rehearsal:
    name: install rehearsal (node 22)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Pack and install into fresh dir
        run: |
          TARBALL="$(npm pack --silent)"
          cd /tmp
          mkdir install-test
          cd install-test
          npm init -y > /dev/null
          npm install "${GITHUB_WORKSPACE}/${TARBALL}"
          ./node_modules/.bin/xmesh-agent --version
          ./node_modules/.bin/xmesh-agent --help
          if ./node_modules/.bin/xmesh-agent run 2>&1 | grep -q "missing --config"; then
            echo "CLI stub check ok"
          else
            echo "::error::CLI did not reject run without --config"
            exit 1
          fi
