name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: unit tests (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - name: Verify package tarball contents
        if: matrix.node == '22'
        run: |
          npm pack --dry-run
          if npm pack --dry-run 2>&1 | grep -E 'test/|node_modules/|\.git/' ; then
            echo "::error::Tarball leaked test/, node_modules/, or .git/"
            exit 1
          fi

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan working tree
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact --verbose --exit-code 1
      - name: Scan git history
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact --log-opts="--all" --exit-code 1

  install-rehearsal:
    name: install rehearsal (node 22)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Pack and install into fresh dir
        run: |
          TARBALL="$(npm pack --silent)"
          cd /tmp
          mkdir install-test
          cd install-test
          npm init -y > /dev/null
          npm install "${GITHUB_WORKSPACE}/${TARBALL}"
          ./node_modules/.bin/xmesh-agent --version
          ./node_modules/.bin/xmesh-agent --help
          if ./node_modules/.bin/xmesh-agent run 2>&1 | grep -q "missing --config"; then
            echo "CLI stub check ok"
          else
            echo "::error::CLI did not reject run without --config"
            exit 1
          fi
